<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NES Disassembly Tool</title>
    <link rel="stylesheet" href="/api/theme.css" id="theme-link">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body { font-family: monospace; padding: 20px; }
        .disassembly-table { border-collapse: collapse; width: 100%; }
        .disassembly-table td { padding: 2px 8px; vertical-align: top; position: relative; }
        .address { width: 100px; user-select: none; }
        .hex { width: 200px; user-select: none; }
        .opcode { width: 60px; }
        .operand { width: 150px; }
        .comment { min-width: 200px; white-space: pre-wrap; }
        .symbol-line { color: var(--symbol-color); font-weight: bold; }
        [contenteditable]:focus { outline: 1px solid #4a90e2; background: rgba(74, 144, 226, 0.1); }
        .editable-container { cursor: text; min-height: 1.2em; padding-left: 4px; }
        .edit-icon { 
            position: absolute; left: -12px; top: 2px; 
            opacity: 0; pointer-events: none; font-size: 14px;
            background: #444; padding: 0px 4px; border-radius: 3px; color: #fff;
            z-index: 10; line-height: 1.2em;
        }
        td:hover > .edit-icon { opacity: 0.7; }
        .editable-container[contenteditable="true"] .edit-icon { display: none; }
        .header { margin-bottom: 20px; border-bottom: 1px solid #444; padding-bottom: 10px; }
        select { background: #333; color: #fff; border: 1px solid #666; padding: 4px; }
    </style>
</head>
<body x-data="disasmApp" @update-annotation.window="updateAnnotation($event.detail.line, $event.detail.field, $event.detail.value)">
    <div class="header">
        <h1>z2doc: <span x-text="metadata.rom_file"></span></h1>
        <div style="display: flex; gap: 20px; align-items: center;">
            <div>
                Bank:
                <select x-model="currentBank" @change="changeBank()">
                    <template x-for="i in Array.from({length: metadata.total_banks}, (_, i) => i)">
                        <option :value="i" x-text="'$' + i.toString(16).padStart(2, '0')"></option>
                    </template>
                </select>
            </div>
            <div>
                Theme:
                <select x-model="currentTheme" @change="setTheme()">
                    <template x-for="theme in themes">
                        <option :value="theme" x-text="theme"></option>
                    </template>
                </select>
            </div>
        </div>
    </div>

    <table class="disassembly-table">
        <template x-for="line in disassembly" :key="line.address_label">
            <tbody>
                <!-- Block Comment -->
                <template x-if="line.block_comment">
                    <tr>
                        <td colspan="5">
                            <div class="comment editable-container" x-data="editField"
                                :contenteditable="editing"
                                @click="if(!editing) startEdit()"
                                @blur="stopEdit(line, 'block_comment')"
                                x-text="line.block_comment.split('\n').map(l => '; ' + l).join('\n')">
                            </div>
                            <span class="edit-icon">✎</span>
                        </td>
                    </tr>
                </template>
                <!-- Symbol -->
                <template x-if="line.symbol">
                    <tr>
                        <td colspan="5">
                            <div class="symbol editable-container" x-data="editField"
                                :contenteditable="editing"
                                @click="if(!editing) startEdit()"
                                @blur="stopEdit(line, 'symbol')"
                                x-text="line.symbol + ':'">
                            </div>
                            <span class="edit-icon">✎</span>
                        </td>
                    </tr>
                </template>
                <!-- Instruction -->
                <tr :id="'addr-' + line.address">
                    <td class="address" x-text="line.address_label"></td>
                    <td class="hex" x-text="line.bytes"></td>
                    <td class="opcode" x-text="line.opcode"></td>
                    <td class="operand"><span x-text="line.operand_prefix"></span><template x-if="line.target_address"><a href="#" @click.prevent="navigate(line.target_bank, line.target_address)" :class="line.operand_is_symbol ? 'symbol' : ''" x-text="line.operand_main"></a></template><template x-if="!line.target_address"><span :class="line.operand_is_symbol ? 'symbol' : ''" x-text="line.operand_main"></span></template><span x-text="line.operand_suffix"></span></td>
                    <td class="comment-cell">
                        <div class="comment editable-container" x-data="editField"
                            :contenteditable="editing"
                            @click="if(!editing) startEdit()"
                            @blur="stopEdit(line, 'comment')"
                            x-text="line.comment ? '; ' + line.comment : ''">
                        </div>
                        <span class="edit-icon">✎</span>
                    </td>
                </tr>
            </tbody>
        </template>
    </table>

    <script src="/static/app.js"></script>
</body>
</html>
