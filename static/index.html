<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NES Disassembly Tool</title>
    <link rel="stylesheet" href="/api/theme.css" id="theme-link">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body { font-family: monospace; padding: 20px; }
        
        .disassembly-grid { 
            display: grid; 
            grid-template-columns: var(--col-addr, 100px) var(--col-hex, 200px) var(--col-op, 60px) var(--col-operand, 150px) 1fr;
            width: 100%;
        }

        .grid-header { font-weight: bold; border-bottom: 1px solid #444; padding-bottom: 5px; margin-bottom: 10px; display: contents; }
        .grid-row { display: contents; }
        .grid-cell { padding: 2px 8px; vertical-align: top; position: relative; }
        .comment-cell { padding-right: 20px; }
        
        /* Resizer Handle */
        .resizer {
            position: absolute; right: 0; top: 0; bottom: 0; width: 4px;
            cursor: col-resize; z-index: 20;
        }
        .resizer:hover { background: rgba(74, 144, 226, 0.5); }
        .resizing { cursor: col-resize; user-select: none; }

        .address { user-select: none; }
        .hex { user-select: none; }
        .comment { white-space: pre-wrap; }
        .full-width { grid-column: 1 / -1; }
        
        [contenteditable]:focus { outline: 1px solid #4a90e2; background: rgba(74, 144, 226, 0.1); }
        .editable-container { cursor: text; min-height: 1.2em; padding-left: 4px; }
        .edit-icon { 
            position: absolute; left: -12px; top: 2px; 
            opacity: 0; pointer-events: none; font-size: 14px;
            background: #444; padding: 0px 4px; border-radius: 3px; color: #fff;
            z-index: 10; line-height: 1.2em;
        }
        .grid-cell:hover > .edit-icon { opacity: 0.7; }
        .editable-container[contenteditable="true"] .edit-icon { display: none; }
        
        .header { margin-bottom: 20px; border-bottom: 1px solid #444; padding-bottom: 10px; }
        select { background: #333; color: #fff; border: 1px solid #666; padding: 4px; }
    </style>
</head>
<body x-data="disasmApp" 
      @update-annotation.window="updateAnnotation($event.detail.line, $event.detail.field, $event.detail.value)"
      @mousemove="if(resizing) resize($event)"
      @mouseup="stopResizing()"
      :class="resizing ? 'resizing' : ''">
    
    <div class="header">
        <h1>z2doc: <span x-text="metadata.rom_file"></span></h1>
        <div style="display: flex; gap: 20px; align-items: center;">
            <div>
                Bank:
                <select x-model="currentBank" @change="changeBank()">
                    <template x-for="i in Array.from({length: metadata.total_banks}, (_, i) => i)">
                        <option :value="i" x-text="'$' + i.toString(16).padStart(2, '0')"></option>
                    </template>
                </select>
            </div>
            <div>
                Theme:
                <select x-model="currentTheme" @change="setTheme()">
                    <template x-for="theme in themes">
                        <option :value="theme" x-text="theme"></option>
                    </template>
                </select>
            </div>
        </div>
    </div>

    <div class="disassembly-grid" :style="gridStyles">
        <!-- Grid Header for Resizing -->
        <div class="grid-header">
            <div class="grid-cell">Addr<div class="resizer" @mousedown="startResizing('addr', $event)"></div></div>
            <div class="grid-cell">Bytes<div class="resizer" @mousedown="startResizing('hex', $event)"></div></div>
            <div class="grid-cell">Op<div class="resizer" @mousedown="startResizing('op', $event)"></div></div>
            <div class="grid-cell">Operand<div class="resizer" @mousedown="startResizing('operand', $event)"></div></div>
            <div class="grid-cell">Comment</div>
        </div>

        <template x-for="line in disassembly" :key="line.address_label">
            <div class="grid-row">
                <!-- Block Comment -->
                <template x-if="line.block_comment">
                    <div class="grid-cell full-width">
                        <div class="comment editable-container" x-data="editField"
                            :contenteditable="editing"
                            @click="if(!editing) startEdit()"
                            @blur="stopEdit(line, 'block_comment')"
                            @keydown.enter.ctrl.prevent="$el.blur()"
                            x-text="line.block_comment.split('\n').map(l => '; ' + l).join('\n')">
                        </div>
                        <span class="edit-icon">✎</span>
                    </div>
                </template>
                <!-- Symbol -->
                <template x-if="line.symbol">
                    <div class="grid-cell full-width">
                        <div class="symbol editable-container" x-data="editField"
                            :contenteditable="editing"
                            @click="if(!editing) startEdit()"
                            @blur="stopEdit(line, 'symbol')"
                            @keydown.enter.prevent="$el.blur()"
                            x-text="line.symbol + ':'">
                        </div>
                        <span class="edit-icon">✎</span>
                    </div>
                </template>
                <!-- Instruction -->
                <div class="grid-cell address" x-text="line.address_label" :id="'addr-' + line.address"></div>
                <div class="grid-cell hex" x-text="line.bytes"></div>
                <div class="grid-cell opcode" x-text="line.opcode"></div>
                <div class="grid-cell operand"><span x-text="line.operand_prefix"></span><template x-if="line.target_address"><a href="#" @click.prevent="navigate(line.target_bank, line.target_address)" :class="line.operand_is_symbol ? 'symbol' : ''" :title="line.operand_is_symbol ? '$' + line.target_address.toString(16).toUpperCase().padStart(4, '0') : ''" x-text="line.operand_main"></a></template><template x-if="!line.target_address"><span :class="line.operand_is_symbol ? 'symbol' : ''" :title="line.operand_is_symbol && line.target_address ? '$' + line.target_address.toString(16).toUpperCase().padStart(4, '0') : ''" x-text="line.operand_main"></span></template><span x-text="line.operand_suffix"></span></div>
                <div class="grid-cell comment-cell">
                    <div class="comment editable-container" x-data="editField"
                        :contenteditable="editing"
                        @click="if(!editing) startEdit()"
                        @blur="stopEdit(line, 'comment')"
                        @keydown.enter.prevent="$el.blur()"
                        x-text="line.comment ? '; ' + line.comment : ''">
                    </div>
                    <span class="edit-icon">✎</span>
                </div>
            </div>
        </template>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
