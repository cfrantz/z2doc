<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NES Disassembly Tool</title>
    <link rel="stylesheet" href="/api/theme.css" id="theme-link">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body { font-family: monospace; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .header { 
            padding: 20px; 
            border-bottom: 1px solid #444; 
            background: inherit;
            z-index: 100;
            flex-shrink: 0;
        }

        .disassembly-container {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px 20px 20px;
        }

        .disassembly-grid { 
            display: grid; 
            grid-template-columns: var(--col-addr, 100px) var(--col-hex, 200px) var(--col-op, 60px) var(--col-operand, 150px) 1fr;
            width: 100%;
        }

        .grid-header { 
            font-weight: bold; 
            margin-top: 15px;
            display: grid;
            grid-template-columns: var(--col-addr, 100px) var(--col-hex, 200px) var(--col-op, 60px) var(--col-operand, 150px) 1fr;
            width: 100%;
            background: #333;
            color: #eee;
        }

        .grid-header .grid-cell {
            border: 1px solid #555;
            border-right: none;
            padding: 4px 8px;
        }

        .grid-header .grid-cell:last-child {
            border-right: 1px solid #555;
        }

        .grid-row { display: contents; }
        .grid-cell { padding: 2px 8px; vertical-align: top; position: relative; }
        .grid-cell.operand { display: flex; align-items: baseline; }
        .comment-cell { padding-right: 20px; }
        
        /* Resizer Handle */
        .resizer {
            position: absolute; right: 0; top: 0; bottom: 0; width: 6px;
            cursor: col-resize; z-index: 20;
            border-right: 2px solid rgba(74, 144, 226, 0);
            transition: border-color 0.2s;
        }
        .resizer:hover { 
            border-right-color: rgba(74, 144, 226, 0.8);
            background: rgba(74, 144, 226, 0.1);
        }
        .resizing { cursor: col-resize; user-select: none; }

        .address { user-select: none; }
        .hex { user-select: none; }
        .comment { white-space: pre-wrap; }
        .full-width { grid-column: 1 / -1; }
        .pending { text-decoration: line-through; opacity: 0.6; pointer-events: none; }
        
        [contenteditable]:focus { outline: 1px solid #4a90e2; background: rgba(74, 144, 226, 0.1); }
        .editable-container { cursor: text; min-height: 1.2em; padding-left: 4px; }
        .edit-icon { 
            position: absolute; left: -12px; top: 2px; 
            opacity: 0; pointer-events: none; font-size: 14px;
            background: #444; padding: 0px 4px; border-radius: 3px; color: #fff;
            z-index: 10; line-height: 1.2em;
        }
        .grid-cell:hover > .edit-icon { opacity: 0.7; }
        .editable-container[contenteditable="true"] .edit-icon { display: none; }

        .context-menu {
            position: fixed; background: #333; border: 1px solid #555;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5); z-index: 1000;
            display: flex; flex-direction: column; padding: 4px 0; min-width: 150px;
        }
        .context-menu button {
            background: none; border: none; color: #eee; padding: 8px 16px;
            text-align: left; cursor: pointer; font-family: inherit; font-size: 14px;
        }
        .context-menu button:hover { background: #4a90e2; color: #fff; }
        
        .header { margin-bottom: 20px; border-bottom: 1px solid #444; padding-bottom: 10px; }
        select { background: #333; color: #fff; border: 1px solid #666; padding: 4px; }
    </style>
</head>
<body x-data="disasmApp" 
      @update-annotation.window="updateAnnotation($event.detail.line, $event.detail.field, $event.detail.value)"
      @show-menu.window="contextMenu = { show: true, x: $event.detail.x, y: $event.detail.y, target: $event.detail.target, line: $event.detail.line, type: $event.detail.type }"
      @mousemove="if(resizing) resize($event)"
      @mouseup="stopResizing()"
      @click="contextMenu.show = false"
      :class="resizing ? 'resizing' : ''">

    <!-- Custom Context Menu -->
    <div x-show="contextMenu.show" 
         class="context-menu" 
         :style="`left: ${contextMenu.x}px; top: ${contextMenu.y}px;`"
         @click.away="contextMenu.show = false">
        <template x-if="contextMenu.type === 'symbol'">
            <button @click="contextMenu.target.dispatchEvent(new CustomEvent('edit-symbol', { bubbles: true })); contextMenu.show = false">Rename Symbol</button>
        </template>
        <button @click="addBlockComment(contextMenu.line); contextMenu.show = false">Add Block Comment</button>
    </div>
    
    <div class="header">
        <h1 style="margin-top: 0;">Docusemmbler: <span x-text="metadata.title"></span></h1>
        <div style="display: flex; gap: 20px; align-items: center;">
            <div>
                Bank:
                <select x-model="currentBank" @change="changeBank()">
                    <template x-for="(title, id) in metadata.banks" :key="id">
                        <option :value="id" x-text="'$' + parseInt(id).toString(16).toUpperCase().padStart(2, '0') + (title ? ': ' + title : '')"></option>
                    </template>
                </select>
            </div>
            <div>
                Theme:
                <select x-model="currentTheme" @change="setTheme()">
                    <template x-for="theme in themes">
                        <option :value="theme" x-text="theme"></option>
                    </template>
                </select>
            </div>
        </div>

        <!-- Column Headers moved into fixed header area -->
        <div class="grid-header" :style="gridStyles">
            <div class="grid-cell">Addr<div class="resizer" @mousedown="startResizing('addr', $event)"></div></div>
            <div class="grid-cell">Bytes<div class="resizer" @mousedown="startResizing('hex', $event)"></div></div>
            <div class="grid-cell">Op<div class="resizer" @mousedown="startResizing('op', $event)"></div></div>
            <div class="grid-cell">Operand<div class="resizer" @mousedown="startResizing('operand', $event)"></div></div>
            <div class="grid-cell">Comment</div>
        </div>
    </div>

    <div class="disassembly-container" id="disasm-container" @scroll.debounce.100ms="onScroll()">
        <div class="disassembly-grid" :style="gridStyles">
            <template x-for="line in disassembly" :key="line.address_label">
                <div class="grid-row">
                    <!-- Block Comment (Always shows) -->
                    <template x-if="line.block_comment !== null">
                        <div class="grid-cell full-width">
                            <div class="comment editable-container" x-data="editField" @edit-symbol="startEdit()"
                                :contenteditable="editing"
                                @click="if(!editing) startEdit()"
                                @blur="stopEdit(line, 'block_comment')"
                                @keydown.enter.ctrl.prevent="$el.blur()"
                                @keydown.escape="cancelEdit()"
                                :class="{ 'pending': isPending }"
                                x-text="line.block_comment.split('\n').map(l => '; ' + l).join('\n')">
                            </div>
                            <span class="edit-icon">✎</span>
                        </div>
                    </template>

                    <template x-if="line.bank !== -1">
                        <div style="display: contents">
                            <!-- Symbol -->
                            <template x-if="line.symbol">
                                <div class="grid-cell full-width" :id="'sym-' + line.address">
                                    <div class="symbol editable-container" x-data="editField" @edit-symbol="startEdit()"
                                        :contenteditable="editing"
                                        @click="if(!editing) startEdit()"
                                        @blur="stopEdit(line, 'symbol')"
                                        @keydown.enter.prevent="$el.blur()"
                                        @keydown.escape="cancelEdit()"
                                        @contextmenu.prevent="$dispatch('show-menu', { x: $event.clientX, y: $event.clientY, target: $el, line: line, type: 'symbol' })"
                                        :class="{ 'pending': isPending }"
                                        x-text="line.symbol + ':'">
                                    </div>
                                    <span class="edit-icon">✎</span>
                                </div>
                            </template>
                            <!-- Instruction -->
                            <div class="grid-cell address" x-text="line.address_label" :id="'addr-' + line.address"
                                 @contextmenu.prevent="$dispatch('show-menu', { x: $event.clientX, y: $event.clientY, target: $el, line: line, type: 'address' })"></div>
                            <div class="grid-cell hex" x-text="line.bytes"></div>
                            <div class="grid-cell opcode" x-text="line.opcode"></div>
                            <div class="grid-cell operand">
                                <span x-text="line.operand_prefix"></span>
                                <template x-if="line.target_address">
                                    <span x-data="editField" @edit-symbol="startEdit()" style="display: contents;">
                                        <a href="#" x-show="!editing"
                                           @click.prevent="navigate(line.target_bank, line.target_address)" 
                                           @contextmenu.prevent="$dispatch('show-menu', { x: $event.clientX, y: $event.clientY, target: $el, line: line, type: 'symbol' })"
                                           :class="{ 'symbol': line.operand_is_symbol, 'pending': isPending }" 
                                           :title="line.operand_is_symbol ? (line.target_bank !== null ? '$' + line.target_bank.toString(16).toUpperCase().padStart(2, '0') + ':$' : '$') + line.target_address.toString(16).toUpperCase().padStart(4, '0') : ''" 
                                           x-text="line.operand_main"></a>
                                        <span x-show="editing"
                                              class="symbol"
                                              contenteditable="true"
                                              @blur="stopEdit({ address: line.target_address, bank: line.target_bank === null ? -1 : line.target_bank }, 'symbol')"
                                              @keydown.enter.prevent="$el.blur()"
                                              @keydown.escape="cancelEdit()"
                                              x-text="line.operand_main"></span>
                                    </span>
                                </template>
                                <template x-if="!line.target_address">
                                    <span :class="line.operand_is_symbol ? 'symbol' : ''" 
                                          :title="line.operand_is_symbol && line.target_address ? (line.target_bank !== null ? '$' + line.target_bank.toString(16).toUpperCase().padStart(2, '0') + ':$' : '$') + line.target_address.toString(16).toUpperCase().padStart(4, '0') : ''" 
                                          x-text="line.operand_main"></span>
                                </template>
                                <span x-text="line.operand_suffix"></span>
                            </div>
                            <div class="grid-cell comment-cell">
                                <div class="comment editable-container" x-data="editField" @edit-symbol="startEdit()"
                                    :contenteditable="editing"
                                    @click="if(!editing) startEdit()"
                                    @blur="stopEdit(line, 'comment')"
                                    @keydown.enter.prevent="$el.blur()"
                                    @keydown.escape="cancelEdit()"
                                    :class="{ 'pending': isPending }"
                                    x-text="line.comment ? '; ' + line.comment : ''">
                                </div>
                                <span class="edit-icon">✎</span>
                            </div>
                        </div>
                    </template>

                    <!-- Global Symbols View (Equates) -->
                    <template x-if="line.bank === -1">
                        <div style="display: contents">
                            <div class="grid-cell address" style="grid-column: 1 / span 4; display: flex; align-items: baseline;"
                                 :id="'addr-' + line.address">
                                <div class="symbol editable-container" x-data="editField" @edit-symbol="startEdit()"
                                    :contenteditable="editing"
                                    @click="if(!editing) startEdit()"
                                    @blur="stopEdit(line, 'symbol')"
                                    @keydown.enter.prevent="$el.blur()"
                                    @keydown.escape="cancelEdit()"
                                    :class="{ 'pending': isPending }"
                                    x-text="line.symbol || '???'">
                                </div>
                                <span style="margin-left: 8px;"> = <span x-text="line.address_label"></span></span>
                                <span class="edit-icon">✎</span>
                            </div>
                            <div class="grid-cell comment-cell">
                                <div class="comment editable-container" x-data="editField" @edit-symbol="startEdit()"
                                    :contenteditable="editing"
                                    @click="if(!editing) startEdit()"
                                    @blur="stopEdit(line, 'comment')"
                                    @keydown.enter.prevent="$el.blur()"
                                    @keydown.escape="cancelEdit()"
                                    :class="{ 'pending': isPending }"
                                    x-text="line.comment ? '; ' + line.comment : ''">
                                </div>
                                <span class="edit-icon">✎</span>
                            </div>
                        </div>
                    </template>
                </div>
            </template>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
